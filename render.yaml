services:
  - type: web
    name: mentraai-api
    runtime: dotnet
    plan: free
    buildCommand: cd backend/src/MentraAI.API && dotnet publish -c Release -o /app/publish
    startCommand: dotnet /app/publish/MentraAI.API.dll
    healthCheckPath: /swagger
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:$PORT
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__SecretKey
        sync: false
      - key: Jwt__Issuer
        value: MentraAI
      - key: Jwt__Audience
        value: MentraAI-Users
      - key: Jwt__AccessTokenExpiryMinutes
        value: "15"
      - key: Jwt__RefreshTokenExpiryDays
        value: "7"
      - key: AIService__BaseUrl
        value: https://mentrai.tech
      - key: Cors__AllowedOrigins
        sync: false