server {
    listen 80;
    server_name localhost;

    # Allow uploads up to 20MB (profile pictures, documents, etc.)
    client_max_body_size 20M;

    # === .NET ASP.NET Core 9 API ===
    # All REST API calls (controllers use [Route("api/v1/...")])
    location /api/ {
        proxy_pass         http://dotnet_api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Match the HttpClient timeout in Program.cs (350s)
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }

    # .NET Swagger UI — accessible at /swagger
    location /swagger {
        proxy_pass         http://dotnet_api:8080/swagger;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # === FastAPI (Python AI Service) ===
    # All other routes are handled by FastAPI
    location / {
        proxy_pass         http://fastapi:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # AI inference can take time — generous timeout
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }

    # FastAPI Prometheus metrics endpoint (obfuscated path)
    location /f2b4_104361_305043_nwfe_b50f_oowef {
        proxy_pass http://fastapi:8000/f2b4_104361_305043_nwfe_b50f_oowef;
    }
}