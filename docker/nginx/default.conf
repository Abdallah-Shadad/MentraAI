server {
    listen 80;
    server_name localhost;

    # Allow uploads up to 20MB
    client_max_body_size 20M;

    # =========================================================
    # Next.js Static Assets — aggressive caching for performance
    # These files have content-hashed names so they never change
    # =========================================================
    location /_next/static/ {
        proxy_pass         http://nextjs:3000/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;

        # Cache for 1 year — Next.js filenames include a content hash
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # Next.js internal routes (image optimisation, HMR websocket)
    location /_next/ {
        proxy_pass         http://nextjs:3000/_next/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # =========================================================
    # .NET ASP.NET Core 9 API
    # All REST calls — controllers use [Route("api/v1/...")]
    # =========================================================
    location /api/ {
        proxy_pass         http://dotnet_api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Match HttpClient timeout in Program.cs (350s)
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }

    # .NET Swagger UI
    location /swagger {
        proxy_pass         http://dotnet_api:8080/swagger;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # =========================================================
    # Next.js — handles ALL browser-facing routes
    # App Router + next-intl i18n (/en/*, /ar/*, /)
    # FastAPI is INTERNAL only — not exposed here.
    # .NET calls FastAPI directly via http://fastapi:8000
    # =========================================================
    location / {
        proxy_pass         http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (Next.js internals)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}