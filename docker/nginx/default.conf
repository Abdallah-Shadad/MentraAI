server {
    listen 80;
    server_name mentrai.tech www.mentrai.tech;

    # Let's Encrypt / Certbot webroot renewal challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================
# HTTPS server (port 443)
# =============================================================
server {
    listen 443 ssl;
    http2 on;
    server_name mentrai.tech www.mentrai.tech;

    # ── TLS certificates (mounted from host /etc/letsencrypt) ──
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── Modern TLS settings ────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── HSTS (tells browsers to always use HTTPS) ──────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;


    # Allow uploads up to 20MB
    client_max_body_size 20M;

    # =========================================================
    # Next.js Static Assets — aggressive caching for performance
    # These files have content-hashed names so they never change
    # =========================================================
    location /_next/static/ {
        proxy_pass         http://nextjs:3000/_next/static/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;

        # Cache for 1 year — Next.js filenames include a content hash
        expires            1y;
        add_header         Cache-Control "public, immutable";
    }

    # Next.js internal routes (image optimisation, HMR websocket)
    location /_next/ {
        proxy_pass         http://nextjs:3000/_next/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }

    # =========================================================
    # .NET ASP.NET Core 9 API
    # All REST calls — controllers use [Route("api/v1/...")]
    # =========================================================
    location /api/ {
        proxy_pass         http://dotnet_api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Match HttpClient timeout in Program.cs (350s)
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }

    # .NET Swagger UI
    location /swagger {
        proxy_pass         http://dotnet_api:8080/swagger;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # =========================================================
    # Next.js — handles ALL browser-facing routes
    # App Router + next-intl i18n (/en/*, /ar/*, /)
    # FastAPI is INTERNAL only — not exposed here.
    # .NET calls FastAPI directly via http://fastapi:8000
    # =========================================================
    location / {
        proxy_pass         http://nextjs:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (Next.js internals)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
