  #   restart: always
  
networks:
  # frontend: Next.js + nginx only
  frontend:
    driver: bridge
  # backend: all internal services (FastAPI, .NET, Redis, Postgres)
  backend:
    driver: bridge

volumes:
  fastapi_data:
  redis_data:
  postgres_data:
  # prometheus_data:
  # grafana_data:
