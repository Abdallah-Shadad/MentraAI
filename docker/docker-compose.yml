  #   networks:
  #     - backend
  #   restart: always

  # # Node Exporter for system Metrics
  # node-exporter:
  #   image: prom/node-exporter:v1.10.2
  #   container_name: node-exporter
  #   ports:
  #     - "9100:9100"
  #   networks:
  #     - backend
  #   volumes:
  #     - /proc:/host/proc:ro
  #     - /sys:/host/sys:ro
  #     - /:/rootfs:ro
  #   command:
  #     - '--path.procfs=/host/proc'
